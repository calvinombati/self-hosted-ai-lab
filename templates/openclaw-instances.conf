# OpenClaw instance registry
# Format: USERNAME PORT  # optional comment
#
# Naming: oc-<name> (lowercase, alphanumeric, hyphens)
# Ports:  *789, increment by 1000 (18789, 19789, 20789, ...)
#
# Add one line per instance, then run:
#   sudo openclaw-provision.sh batch /srv/openclaw-instances.conf
#   # For each instance: ssh <user>@<IP> → openclaw onboard → openclaw-provision.sh post-onboard

oc-work      18789   # Work projects
oc-personal  19789   # Personal use
